services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: person_management_db
    environment:
      SA_PASSWORD: "Admin@123456"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/lib/mssql/data

volumes:
  sqlserver_data:
